<script>

new TomSelect("#village");

let layer1Count = 0;
let layer2Count = 0;
let layer3Count = 0;

// LAYER 1

function addLayer1(){

layer1Count++;

const div = document.createElement('div');

div.className = 'person-card rounded-2xl p-5';

div.innerHTML = `
<h3 class="text-xl font-bold mb-4">Person ${layer1Count}</h3>

<div class="grid md:grid-cols-2 gap-4">

<input type="text" placeholder="Full Name"
class="name input-dark rounded-xl p-3">

<input type="text" placeholder="Mobile Number"
class="mobile input-dark rounded-xl p-3">

<select class="mukhiya input-dark rounded-xl p-3">
<option>Yes</option>
<option>No</option>
</select>

<select class="influence input-dark rounded-xl p-3">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input type="text" placeholder="Main Issue"
class="issue input-dark rounded-xl p-3">

<input type="text" placeholder="Notes"
class="notes input-dark rounded-xl p-3">

</div>
`;

document.getElementById('layer1Container')
.appendChild(div);

updateCounter();

}

// LAYER 2

function addLayer2(){

layer2Count++;

const div = document.createElement('div');

div.className = 'person-card rounded-2xl p-5';

div.innerHTML = `
<h3 class="text-xl font-bold mb-4">Person ${layer2Count}</h3>

<div class="grid md:grid-cols-2 gap-4">

<input type="text" placeholder="Full Name"
class="l2-name input-dark rounded-xl p-3">

<input type="text" placeholder="Mobile Number"
class="l2-mobile input-dark rounded-xl p-3">

<select class="l2-profession input-dark rounded-xl p-3">
<option>Teacher</option>
<option>Businessman</option>
<option>Govt Job</option>
<option>Doctor</option>
</select>

<select class="l2-education input-dark rounded-xl p-3">
<option>10th</option>
<option>12th</option>
<option>Graduate</option>
<option>Post Graduate</option>
</select>

<input type="text" placeholder="Notes"
class="l2-notes input-dark rounded-xl p-3">

</div>
`;

document.getElementById('layer2Container')
.appendChild(div);

updateCounter();

}

// LAYER 3

function addLayer3(){

layer3Count++;

const div = document.createElement('div');

div.className = 'person-card rounded-2xl p-5';

div.innerHTML = `
<h3 class="text-xl font-bold mb-4">Youth ${layer3Count}</h3>

<div class="grid md:grid-cols-2 gap-4">

<input type="text" placeholder="Full Name"
class="l3-name input-dark rounded-xl p-3">

<input type="text" placeholder="Mobile Number"
class="l3-mobile input-dark rounded-xl p-3">

<input type="number" placeholder="Age"
class="l3-age input-dark rounded-xl p-3">

<select class="l3-social input-dark rounded-xl p-3">
<option>Instagram</option>
<option>Facebook</option>
<option>YouTube</option>
<option>WhatsApp</option>
</select>

<input type="text" placeholder="Notes"
class="l3-notes input-dark rounded-xl p-3">

</div>
`;

document.getElementById('layer3Container')
.appendChild(div);

updateCounter();

}

// COUNTER

function updateCounter(){

const total =
document.querySelectorAll('.person-card').length;

document.getElementById('totalCounter')
.innerText = total;

}

// EXPORT

function exportExcel(){

const workbook = XLSX.utils.book_new();

const layer1 = [];
const layer2 = [];
const layer3 = [];

document.querySelectorAll('#layer1Container .person-card')
.forEach(card=>{

layer1.push({
Name: card.querySelector('.name').value,
Mobile: card.querySelector('.mobile').value,
Mukhiya: card.querySelector('.mukhiya').value,
Influence: card.querySelector('.influence').value,
Issue: card.querySelector('.issue').value,
Notes: card.querySelector('.notes').value,
});

});

document.querySelectorAll('#layer2Container .person-card')
.forEach(card=>{

layer2.push({
Name: card.querySelector('.l2-name').value,
Mobile: card.querySelector('.l2-mobile').value,
Profession: card.querySelector('.l2-profession').value,
Education: card.querySelector('.l2-education').value,
Notes: card.querySelector('.l2-notes').value,
});

});

document.querySelectorAll('#layer3Container .person-card')
.forEach(card=>{

layer3.push({
Name: card.querySelector('.l3-name').value,
Mobile: card.querySelector('.l3-mobile').value,
Age: card.querySelector('.l3-age').value,
Social: card.querySelector('.l3-social').value,
Notes: card.querySelector('.l3-notes').value,
});

});

const ws1 = XLSX.utils.json_to_sheet(layer1);
const ws2 = XLSX.utils.json_to_sheet(layer2);
const ws3 = XLSX.utils.json_to_sheet(layer3);

XLSX.utils.book_append_sheet(workbook, ws1, "Layer1");
XLSX.utils.book_append_sheet(workbook, ws2, "Layer2");
XLSX.utils.book_append_sheet(workbook, ws3, "Layer3");

XLSX.writeFile(workbook,"Kama_Ground_Intelligence.xlsx");

}

addLayer1();

</script>
