      </div>

    </div>

    <!-- Export Button -->
    <div class="text-center mt-8">
      <button onclick="exportExcel()" class="bg-green-600 text-white px-8 py-4 rounded-xl text-lg hover:bg-green-700">
        Export To Excel
      </button>
    </div>

  <script>

    let layer1Count = 0;

    function addLayer1() {
      layer1Count++;

      const container = document.getElementById('layer1Container');

      const div = document.createElement('div');
      div.className = 'border rounded-xl p-4 bg-gray-50';

      div.innerHTML = `
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-lg">Person ${layer1Count}</h3>
          <button onclick="this.parentElement.parentElement.remove()" class="text-red-600 font-bold">Remove</button>
        </div>

        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <label class="font-semibold">Full Name</label>
            <input type="text" class="name w-full border rounded-lg p-3 mt-1" placeholder="Enter full name">
          </div>

          <div>
            <label class="font-semibold">Mobile Number</label>
            <input type="text" class="mobile w-full border rounded-lg p-3 mt-1" placeholder="Enter mobile number">
          </div>

          <div>
            <label class="font-semibold">Mukhiya</label>
            <select class="mukhiya w-full border rounded-lg p-3 mt-1">
              <option>Yes</option>
              <option>No</option>
            </select>
          </div>

          <div>
            <label class="font-semibold">Influence Level</label>
            <select class="influence w-full border rounded-lg p-3 mt-1">
              <option>Low</option>
              <option>Medium</option>
              <option>High</option>
            </select>
          </div>

          <div>
            <label class="font-semibold">Main Issue</label>
            <input type="text" class="issue w-full border rounded-lg p-3 mt-1" placeholder="Village issue">
          </div>

          <div>
            <label class="font-semibold">Notes</label>
            <input type="text" class="notes w-full border rounded-lg p-3 mt-1" placeholder="Extra notes">
          </div>
        </div>
      `;

      container.appendChild(div);
    }

    // Default one form
    addLayer1();

    function exportExcel() {

      const village = document.getElementById('village').value;
      const booth = document.getElementById('booth').value;
      const worker = document.getElementById('worker').value;

      const cards = document.querySelectorAll('#layer1Container > div');

      const data = [];

      cards.forEach(card => {
        const row = {
          Village: village,
          Booth: booth,
          Worker: worker,
          Name: card.querySelector('.name').value,
          Mobile: card.querySelector('.mobile').value,
          Mukhiya: card.querySelector('.mukhiya').value,
          Influence: card.querySelector('.influence').value,
          Issue: card.querySelector('.issue').value,
          Notes: card.querySelector('.notes').value,
        };

        data.push(row);
      });

      const worksheet = XLSX.utils.json_to_sheet(data);
      const workbook = XLSX.utils.book_new();

      XLSX.utils.book_append_sheet(workbook, worksheet, 'Layer1');

      XLSX.writeFile(workbook, `${village}_Layer1_Data.xlsx`);
    }

  </script>
